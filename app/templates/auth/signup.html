<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signup | TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="auth-page">
  <section class="auth-card">
    <div class="auth-logo">TaskFlow</div>
    <form id="signup-form" class="form-grid">
      <div class="field"><label for="name">Name</label><input id="name" type="text" autocomplete="name" required></div>
      <div class="field"><label for="email">Email</label><input id="email" type="email" autocomplete="email" required></div>
      <div class="field"><label for="password">Password</label><input id="password" type="password" minlength="8" required></div>
      <div class="field"><label for="confirm-password">Confirm password</label><input id="confirm-password" type="password" minlength="8" required></div>
      <button class="btn btn-primary full" type="submit">Create account</button>
      <div id="error" class="error-text"></div>
      <p class="muted">Already have an account? <a href="/login">Login</a></p>
    </form>
  </section>
  <script src="/static/js/api.js"></script>
  <script>
    document.getElementById("signup-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const error = document.getElementById("error");
      error.textContent = "";
      const password = document.getElementById("password").value;
      if (password !== document.getElementById("confirm-password").value) {
        error.textContent = "Passwords do not match";
        return;
      }
      try {
        const result = await apiPost("/api/auth/signup", {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password
        });
        localStorage.setItem("access_token", result.access_token);
        localStorage.setItem("user", JSON.stringify(result.user));
        window.location.href = "/dashboard";
      } catch (err) {
        error.textContent = err.message;
      }
    });
  </script>
</body>
</html>
